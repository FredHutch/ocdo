name: Receive dispatch and trigger build

on:
  repository_dispatch:
    types: [dispatch-event]

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch with trigger file
        run: |
          FULL_SHA="${{ github.event.client_payload.sha }}"
          SHORT_SHA="${FULL_SHA:0:7}"
          BRANCH_NAME="trigger-build/proof-${SHORT_SHA}"
          git checkout -b "$BRANCH_NAME"

          # Create a file change to trigger the deploy preview workflow
          echo "Triggered by: ${{ github.event.client_payload.ref }}" > .build-trigger
          echo "Source commit: ${{ github.event.client_payload.sha }}" >> .build-trigger
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> .build-trigger

          git add .build-trigger
          git commit -m "chore: trigger build from proof repo

          Triggered by: ${{ github.event.client_payload.ref }}
          Source commit: ${{ github.event.client_payload.sha }}"
          git push origin "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --reviewer seankross \
            --reviewer sckott \
            --title "chore: trigger build from proof repo" \
            --body "This PR was automatically created to trigger a site build.

          **Source:** [FredHutch/proof](https://github.com/FredHutch/proof)
          **Triggered by:** \`${{ github.event.client_payload.ref }}\`
          **Source commit:** \`${{ github.event.client_payload.sha }}\`

          Check out the deploy preview link below.

          Merge this PR to trigger the build in the 3rd party system."
